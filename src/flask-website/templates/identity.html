{% extends "layout.html" %}
{% block title %}Identité{% endblock %}

{% block content %}
<h2>Liste des utilisateurs</h2>

<table class="table table-hover shadow-sm rounded mt-4">
    <thead class="table-dark">
        <tr>
            <th>Nom d'utilisateur</th>
            <th>Rôle</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.role }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<a href="{{ url_for('home') }}" class="btn btn-secondary mt-3">Retour</a>
{% endblock %}
