<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Web Configurator{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Material Design 3 (Material‑You) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(180deg, #e3f2fd 0%, #ffffff 100%);
        color: #333;
        padding-top: 4.5rem;
      }
      .navbar {
        background-color: #1976d2;
      }
      .navbar-brand, .nav-link {
        color: white !important;
        font-weight: 500;
      }
      footer {
        margin-top: 3rem;
        padding: 1rem 0;
        text-align: center;
        color: #777;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">Web Configurator</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">

            {% if session.get('logged') %}
              <li class="nav-item"><a class="nav-link" href="{{ url_for('ws_list') }}">Web Servers</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('rp_list') }}">Reverse Proxies</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('lb_list') }}">Load Balancers</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('identity_page') }}">Identité</a></li>

              <li class="nav-item">
                <a class="nav-link text-warning" href="{{ url_for('logout') }}">Déconnexion</a>
              </li>

            {% else %}
              <li class="nav-item">
                <a class="nav-link text-light" href="{{ url_for('login') }}">Connexion</a>
              </li>
            {% endif %}

          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      {% block content %}{% endblock %}
    </main>

    <footer>
      <small>Copyright Univ‑Savoie</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
